name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Write deploy beacon
        run: |
          echo "commit=${{ github.sha }}" > dist/deploy-beacon.txt
          echo "run=${{ github.run_number }}" >> dist/deploy-beacon.txt
          echo "time=$(date -u +%FT%TZ)" >> dist/deploy-beacon.txt
          cat dist/deploy-beacon.txt

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_PATH }}/
          protocol: ftp
          port: 21
          log-level: verbose
